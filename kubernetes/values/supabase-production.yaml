## Production Supabase Helm Values
## Uses external RDS (no in-cluster PG), S3 (no MinIO),
## and External Secrets Operator for secret management.

# ──────────────────────────────────────────────
# Secrets — reference ESO-managed K8s Secret
# ──────────────────────────────────────────────
secret:
  jwt:
    secretRef: supabase-secrets
    secretRefKey:
      anonKey: anon_key
      serviceKey: service_role_key
      secret: jwt_secret

  db:
    secretRef: supabase-secrets
    secretRefKey:
      password: db_password
      database: database

  analytics:
    secretRef: supabase-secrets
    secretRefKey:
      publicAccessToken: analytics_public_token
      privateAccessToken: analytics_private_token

  smtp:
    username: ""
    password: ""

  dashboard:
    secretRef: supabase-secrets
    secretRefKey:
      username: dashboard_username
      password: dashboard_password
      openAiApiKey: openai_api_key

  s3:
    secretRef: supabase-secrets
    secretRefKey:
      keyId: s3_key_id
      accessKey: s3_access_key

  realtime:
    secretRef: supabase-secrets
    secretRefKey:
      secretKeyBase: realtime_secret_key_base

  meta:
    secretRef: supabase-secrets
    secretRefKey:
      cryptoKey: meta_crypto_key

  minio:
    user: ""
    password: ""

# ──────────────────────────────────────────────
# Deployment — disable internal PG + MinIO, set resources
# ──────────────────────────────────────────────
deployment:
  # Disable in-cluster Postgres (using RDS)
  db:
    enabled: false

  # Disable MinIO (using S3)
  minio:
    enabled: false

  analytics:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  auth:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  functions:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  imgproxy:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  kong:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  meta:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  realtime:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  rest:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  storage:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  studio:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  vector:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# ──────────────────────────────────────────────
# Environment — point services to RDS and S3
# ──────────────────────────────────────────────
environment:
  analytics:
    LOGFLARE_NODE_HOST: 127.0.0.1
    DB_USERNAME: supabase_admin
    DB_DATABASE: _supabase
    DB_PORT: "5432"
    DB_DRIVER: postgresql
    DB_SCHEMA: _analytics
    POSTGRES_BACKEND_SCHEMA: _analytics
    LOGFLARE_SINGLE_TENANT: "true"
    LOGFLARE_SUPABASE_MODE: "true"
    LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
    # DB_HOSTNAME injected via ExternalSecret

  auth:
    DB_USER: supabase_auth_admin
    DB_PORT: "5432"
    DB_DRIVER: postgres
    DB_SSL: require
    API_EXTERNAL_URL: https://supabase.example.com
    GOTRUE_API_HOST: "0.0.0.0"
    GOTRUE_API_PORT: "9999"
    GOTRUE_SITE_URL: https://supabase.example.com
    GOTRUE_URI_ALLOW_LIST: "*"
    GOTRUE_DISABLE_SIGNUP: "false"
    GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
    GOTRUE_JWT_ADMIN_ROLES: service_role
    GOTRUE_JWT_AUD: authenticated
    GOTRUE_JWT_EXP: "3600"
    GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    GOTRUE_MAILER_AUTOCONFIRM: "true"
    GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
    GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
    GOTRUE_SMS_AUTOCONFIRM: "false"
    # DB_HOSTNAME injected via ExternalSecret

  db: {}

  functions:
    DB_USERNAME: postgres
    DB_PORT: "5432"
    DB_DRIVER: postgresql
    DB_SSL: require
    VERIFY_JWT: "false"
    # DB_HOSTNAME injected via ExternalSecret

  imgproxy:
    IMGPROXY_BIND: ":5001"
    IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
    IMGPROXY_USE_ETAG: "true"
    IMGPROXY_ENABLE_WEBP_DETECTION: "true"

  kong:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
    KONG_DNS_ORDER: LAST,A,CNAME
    KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
    KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    KONG_LOG_LEVEL: warn

  meta:
    DB_USER: supabase_admin
    DB_PORT: "5432"
    DB_DRIVER: postgres
    DB_SSL: require
    PG_META_PORT: "8080"
    # DB_HOSTNAME injected via ExternalSecret

  minio: {}

  realtime:
    DB_USER: supabase_admin
    DB_PORT: "5432"
    DB_SSL: "true"
    PORT: "4000"
    FLY_ALLOC_ID: fly123
    FLY_APP_NAME: realtime
    ENABLE_TAILSCALE: "false"
    DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
    DB_ENC_KEY: supabaserealtime
    ERL_AFLAGS: -proto_dist inet_tcp
    DNS_NODES: "''"
    RLIMIT_NOFILE: "10000"
    APP_NAME: realtime
    SEED_SELF_HOST: "true"
    RUN_JANITOR: "true"
    # DB_HOSTNAME injected via ExternalSecret

  rest:
    DB_USER: authenticator
    DB_PORT: "5432"
    DB_DRIVER: postgres
    DB_SSL: require
    PGRST_DB_SCHEMAS: public,storage,graphql_public
    PGRST_DB_ANON_ROLE: anon
    PGRST_DB_USE_LEGACY_GUCS: "false"
    PGRST_APP_SETTINGS_JWT_EXP: "3600"
    # DB_HOSTNAME injected via ExternalSecret

  storage:
    DB_USER: supabase_storage_admin
    DB_PORT: "5432"
    DB_DRIVER: postgres
    DB_SSL: require
    REQUEST_ALLOW_X_FORWARDED_PATH: "true"
    FILE_SIZE_LIMIT: "52428800"
    FILE_STORAGE_BACKEND_PATH: /var/lib/storage
    TENANT_ID: stub
    REGION: us-east-1
    GLOBAL_S3_BUCKET: stack-ai-supabase-storage
    ENABLE_IMAGE_TRANSFORMATION: "true"
    # DB_HOSTNAME injected via ExternalSecret

  studio:
    HOSTNAME: "::"
    STUDIO_PORT: "3000"
    POSTGRES_PORT: "5432"
    DEFAULT_ORGANIZATION_NAME: Stack AI
    DEFAULT_PROJECT_NAME: Supabase Production
    SUPABASE_PUBLIC_URL: https://supabase.example.com
    NEXT_PUBLIC_ENABLE_LOGS: "true"
    NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

  vector: {}

# ──────────────────────────────────────────────
# Persistence — disable for stateless + external DB
# ──────────────────────────────────────────────
persistence:
  db:
    enabled: false
  minio:
    enabled: false
  functions:
    enabled: true
    size: 2Gi
  imgproxy:
    enabled: false
  storage:
    enabled: false
  snippets:
    enabled: true
    size: 1Gi
  deno:
    enabled: true
    size: 1Gi

# ──────────────────────────────────────────────
# Autoscaling — HPA on stateless services
# ──────────────────────────────────────────────
autoscaling:
  analytics:
    enabled: false
  auth:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  db:
    enabled: false
  functions:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
  imgproxy:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  kong:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  meta:
    enabled: false
  minio:
    enabled: false
  realtime:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  rest:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  storage:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
  studio:
    enabled: false
  vector:
    enabled: false

# ──────────────────────────────────────────────
# Ingress — NGINX Ingress with TLS
# ──────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: supabase-tls
      hosts:
        - supabase.example.com
  hosts:
    - host: supabase.example.com
      paths:
        - path: /
          pathType: Prefix

# ──────────────────────────────────────────────
# Service Accounts — IRSA annotations for S3 access
# ──────────────────────────────────────────────
serviceAccount:
  analytics:
    create: true
    annotations: {}
    name: ""
  auth:
    create: true
    annotations: {}
    name: ""
  db:
    create: true
    annotations: {}
    name: ""
  functions:
    create: true
    annotations: {}
    name: ""
  imgproxy:
    create: true
    annotations: {}
    name: ""
  kong:
    create: true
    annotations: {}
    name: ""
  meta:
    create: true
    annotations: {}
    name: ""
  minio:
    create: true
    annotations: {}
    name: ""
  realtime:
    create: true
    annotations: {}
    name: ""
  rest:
    create: true
    annotations: {}
    name: ""
  storage:
    create: true
    annotations:
      # IRSA role ARN for S3 access — populated by Terraform output
      eks.amazonaws.com/role-arn: "arn:aws:iam::role/supabase-storage-irsa"
    name: supabase-storage
  studio:
    create: true
    annotations: {}
    name: ""
  vector:
    create: true
    annotations: {}
    name: ""
