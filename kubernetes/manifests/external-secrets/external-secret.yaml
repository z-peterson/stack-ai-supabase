apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-secrets
  namespace: supabase
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: supabase-secrets
    creationPolicy: Owner
  data:
    # Database
    - secretKey: db_password
      remoteRef:
        key: stack-ai-supabase/supabase
        property: db_password

    - secretKey: database
      remoteRef:
        key: stack-ai-supabase/supabase
        property: db_name

    # JWT
    - secretKey: jwt_secret
      remoteRef:
        key: stack-ai-supabase/supabase
        property: jwt_secret

    - secretKey: anon_key
      remoteRef:
        key: stack-ai-supabase/supabase
        property: anon_key

    - secretKey: service_role_key
      remoteRef:
        key: stack-ai-supabase/supabase
        property: service_role_key

    # Dashboard
    - secretKey: dashboard_username
      remoteRef:
        key: stack-ai-supabase/supabase
        property: dashboard_username

    - secretKey: dashboard_password
      remoteRef:
        key: stack-ai-supabase/supabase
        property: dashboard_password

    - secretKey: openai_api_key
      remoteRef:
        key: stack-ai-supabase/supabase
        property: openai_api_key

    # Analytics
    - secretKey: analytics_public_token
      remoteRef:
        key: stack-ai-supabase/supabase
        property: analytics_public_token

    - secretKey: analytics_private_token
      remoteRef:
        key: stack-ai-supabase/supabase
        property: analytics_private_token

    # S3 (fallback — prefer IRSA)
    - secretKey: s3_key_id
      remoteRef:
        key: stack-ai-supabase/supabase
        property: s3_key_id

    - secretKey: s3_access_key
      remoteRef:
        key: stack-ai-supabase/supabase
        property: s3_access_key

    # Realtime
    - secretKey: realtime_secret_key_base
      remoteRef:
        key: stack-ai-supabase/supabase
        property: realtime_secret_key_base

    # Meta
    - secretKey: meta_crypto_key
      remoteRef:
        key: stack-ai-supabase/supabase
        property: meta_crypto_key

    # Realtime DB encryption
    - secretKey: db_enc_key
      remoteRef:
        key: stack-ai-supabase/supabase
        property: db_enc_key
