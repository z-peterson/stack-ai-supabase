apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: supabase
spec:
  template:
    metadata:
      labels:
        workload: supabase
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.large
            - t3.xlarge
            - m5.large
            - m5.xlarge
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: supabase
  limits:
    cpu: 48
    memory: 192Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: supabase
spec:
  amiFamily: AL2
  role: KarpenterNodeRole-supabase-cluster
  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: supabase-cluster
  tags:
    Environment: production
    ManagedBy: karpenter
