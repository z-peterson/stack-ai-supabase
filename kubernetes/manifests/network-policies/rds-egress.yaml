apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rds-egress
  namespace: supabase
spec:
  podSelector:
    matchLabels:
      supabase.io/rds-access: "true"
  policyTypes:
    - Egress
  egress:
    # Allow egress to private subnets on PostgreSQL port
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432
